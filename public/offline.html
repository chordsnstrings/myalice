<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline · ARKS Messages Platform</title>
    <style>
        :root { color-scheme: light dark; }
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh; display: grid; place-items: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f7f8f8; color: #191c1e; padding: 24px;
        }
        @media (prefers-color-scheme: dark) { body { background: #111315; color: #f7f8f8; } }
        .card { text-align: center; max-width: 360px; }
        .mark {
            width: 56px; height: 56px; border-radius: 14px; background: #0d9488; color: #fff;
            display: grid; place-items: center; font-weight: 700; font-size: 26px; margin: 0 auto 20px;
        }
        h1 { font-size: 20px; margin: 0 0 8px; }
        p { font-size: 14px; color: #6c7378; margin: 0 0 20px; line-height: 1.5; }
        button {
            font: inherit; font-weight: 600; font-size: 14px; color: #fff; background: #0d9488;
            border: 0; border-radius: 8px; padding: 10px 18px; cursor: pointer;
        }
        button:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div class="card">
        <div class="mark">A</div>
        <h1>You're offline</h1>
        <p>We couldn't reach the server. Your queued messages will send automatically when you reconnect.</p>
        <button onclick="location.reload()">Try again</button>
    </div>
</body>
</html>
